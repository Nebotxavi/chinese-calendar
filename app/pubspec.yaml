name: feng_shui_calendar
description: A daily Chinese Feng Shui Huangli calendar with Spanish translations.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  lunar: ^1.7.8
  flutter_riverpod: ^2.6.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: false

  assets:
    - assets/data/proverbs.min.json
    - assets/images/horse.jpg
    - assets/images/months/

  # TODO: Optimize font file sizes — Chinese fonts are ~15MB each.
  # Consider subsetting with pyftsubset for production.
  fonts:
    - family: NotoSerifSC
      fonts:
        - asset: assets/fonts/NotoSerifSC-Variable.ttf
    - family: NotoSansSC
      fonts:
        - asset: assets/fonts/NotoSansSC-Variable.ttf
    - family: MaShanZheng
      fonts:
        - asset: assets/fonts/MaShanZheng-Regular.ttf
    - family: ZhiMangXing
      fonts:
        - asset: assets/fonts/ZhiMangXing-Regular.ttf
    - family: CormorantGaramond
      fonts:
        - asset: assets/fonts/CormorantGaramond-Regular.ttf
          weight: 400
        - asset: assets/fonts/CormorantGaramond-Italic.ttf
          weight: 400
          style: italic
        - asset: assets/fonts/CormorantGaramond-Medium.ttf
          weight: 500
        - asset: assets/fonts/CormorantGaramond-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/CormorantGaramond-Bold.ttf
          weight: 700
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Variable.ttf
